name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Add SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Decode secrets
        shell: bash
        run: |
          echo "USER=$(echo '${{ secrets.SERVER_USER_B64 }}' | base64 -d)" >> secrets.env
          echo "IP=$(echo '${{ secrets.SERVER_IP_B64 }}' | base64 -d)" >> secrets.env

      - name: Load secrets
        shell: bash
        run: |
          source secrets.env
          echo "Decoded USER=$USER"
          echo "Decoded IP=$IP"

      - name: Deploy to server
        shell: bash
        run: |
          source secrets.env
          echo "SSH will run as: $USER@$IP"
          ssh -o StrictHostKeyChecking=no "$USER@$IP" 'cd /home/deploy/predictoraai && git pull origin main && bash warzone-ultra.sh'
