apiVersion: apps/v1
kind: Deployment
metadata:
  name: predictora-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: predictora-backend
  template:
    metadata:
      labels:
        app: predictora-backend
    spec:
      containers:
        - name: predictora-backend
          image: docker.io/manolio/predictora-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: predictora-backend-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: predictora-backend
spec:
  selector:
    app: predictora-backend
  ports:
    - port: 8000
      targetPort: 8000
