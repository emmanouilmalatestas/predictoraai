apiVersion: apps/v1
kind: Deployment
metadata:
  name: predictora-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: predictora-frontend
  template:
    metadata:
      labels:
        app: predictora-frontend
    spec:
      containers:
        - name: predictora-frontend
          image: docker.io/manolio/predictora-frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: predictora-frontend
spec:
  selector:
    app: predictora-frontend
  ports:
    - port: 80
      targetPort: 80
